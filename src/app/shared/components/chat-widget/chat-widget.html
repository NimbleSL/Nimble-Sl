<div class="chat-widget" [class.is-open]="isOpen">
  <!-- Chat Window -->
  <div class="chat-widget__window" *ngIf="isOpen">
    <div class="chat-widget__header">
      <div class="chat-widget__header-info">
        <div class="chat-widget__avatar">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
          </svg>
        </div>
        <div class="chat-widget__titles">
          <h4>NimbleBot Assistant</h4>
          <span>Online</span>
        </div>
      </div>
      <button class="chat-widget__close" (click)="toggleChat()" aria-label="Close chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="chat-widget__messages" #scrollableArea>
      @for (message of messages; track message.timestamp) {
      <div class="chat-widget__message" [class.chat-widget__message--bot]="message.sender === 'bot'"
        [class.chat-widget__message--user]="message.sender === 'user'">
        <div class="chat-widget__bubble">
          {{ message.text }}
        </div>
        <div class="chat-widget__timestamp">
          {{ message.timestamp | date:'shortTime' }}
        </div>
      </div>
      }
    </div>

    <form class="chat-widget__input-area" (submit)="$event.preventDefault(); sendMessage()">
      <input type="text" [(ngModel)]="currentMessage" name="currentMessage" placeholder="Type a message..."
        autocomplete="off" />
      <button type="submit" [disabled]="!currentMessage.trim()" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <!-- Chat Toggle Button -->
  <button class="chat-widget__toggle" (click)="toggleChat()" [attr.aria-expanded]="isOpen" aria-label="Toggle chat">
    <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
</div>
