<div class="cookie-banner" [class.is-visible]="isVisible">
  <div class="cookie-banner__content">
    <div class="cookie-banner__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5" />
        <path d="M8.5 8.5v.01" />
        <path d="M16 12.5v.01" />
        <path d="M12 16v.01" />
        <path d="M11 11v.01" />
      </svg>
    </div>
    <div class="cookie-banner__text">
      <h3>We value your privacy</h3>
      <p>We use cookies to improve your browsing experience, analyze site traffic, and personalize content. By clicking
        "Accept", you consent to our use of cookies.</p>
    </div>
    <div class="cookie-banner__actions">
      <button class="cookie-banner__btn cookie-banner__btn--outline" (click)="decline()">Decline</button>
      <button class="cookie-banner__btn cookie-banner__btn--primary" (click)="accept()">Accept</button>
    </div>
  </div>
</div>
