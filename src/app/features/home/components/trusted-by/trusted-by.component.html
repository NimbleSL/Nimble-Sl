<section class="trusted">
  <!-- Animated particles background -->
  <div class="trusted__particles">
    <div class="particle particle--1"></div>
    <div class="particle particle--2"></div>
    <div class="particle particle--3"></div>
    <div class="particle particle--4"></div>
    <div class="particle particle--5"></div>
    <div class="particle particle--6"></div>
  </div>

  <div class="trusted__container">
    <p class="trusted__badge">POWERED BY</p>
    <h2 class="trusted__title">
      <span class="trusted__accent">State-of-the-art</span> technology
    </h2>
    <p class="trusted__subtitle">We use the latest frameworks, libraries and tools to create fast, scalable and
      future-proof digital experiences.</p>
  </div>

  <div class="trusted__marquee">
    <div class="trusted__track">
      <!-- Group 1 -->
      <div class="trusted__logos">
        @for (tech of technologies; track tech.name) {
        <div class="trusted__item">
          <img [src]="tech.icon" [alt]="tech.name" class="trusted__icon" width="40" height="40" loading="lazy" />
          <span class="trusted__name">{{ tech.name }}</span>
        </div>
        }
      </div>
      <!-- Group 2 (seamless loop) -->
      <div class="trusted__logos" aria-hidden="true">
        @for (tech of technologies; track tech.name) {
        <div class="trusted__item">
          <img [src]="tech.icon" [alt]="tech.name" class="trusted__icon" width="40" height="40" loading="lazy" />
          <span class="trusted__name">{{ tech.name }}</span>
        </div>
        }
      </div>
    </div>
  </div>
</section>
