<section class="clients">
  <div class="clients__container">
    <div class="clients__header">
      <span class="clients__badge">OUR CLIENTS</span>
      <h2 class="clients__title">Trusted By Industry Leaders</h2>
      <p class="clients__subtitle">We partner with organizations across industries to deliver impactful digital
        solutions.</p>
    </div>

    <div class="clients__grid">
      @for (client of clients; track client.name) {
      <div class="clients__card">
        <div class="clients__logo-wrap">
          <img [src]="client.logo" [alt]="client.name + ' logo'" class="clients__logo" loading="lazy" />
        </div>
        <span class="clients__name">{{ client.name }}</span>
      </div>
      }
    </div>
  </div>
</section>
