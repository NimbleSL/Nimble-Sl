<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NimbleSL — Website Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0A0E1A;
    --bg-2: #0F1629;
    --surface: #141925;
    --surface-2: #1C2333;
    --surface-3: #232B40;
    --border: #2A3149;
    --border-2: #364063;
    --blue: #3B82F6;
    --blue-2: #60A5FA;
    --cyan: #06B6D4;
    --emerald: #10B981;
    --emerald-2: #34D399;
    --amber: #F59E0B;
    --rose: #F43F5E;
    --purple: #A855F7;
    --text: #F1F5F9;
    --text-2: #94A3B8;
    --text-3: #64748B;
    --font-display: "Plus Jakarta Sans", system-ui, sans-serif;
    --font-body: "DM Sans", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { overflow: hidden; }
  #root { width: 100vw; height: 100vh; display: flex; }

  /* Navigator */
  .navigator {
    width: 260px;
    flex-shrink: 0;
    background: #06090F;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }
  .nav-brand {
    padding: 8px 22px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .nav-brand .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display); font-weight: 800; font-size: 16px;
    letter-spacing: -0.01em;
  }
  .nav-brand .logo-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #3B82F6, #06B6D4);
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 14px;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
  }
  .nav-brand .sub {
    font-size: 11px; color: var(--text-3); margin-top: 6px;
    font-family: var(--font-mono);
  }
  .nav-group {
    padding: 4px 12px 0;
    margin-top: 12px;
  }
  .nav-group h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-3);
    margin: 8px 10px 8px;
    font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(59,130,246,0.14), rgba(59,130,246,0.04));
    color: var(--text);
    border-color: rgba(59,130,246,0.28);
  }
  .nav-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-3);
    flex-shrink: 0;
  }
  .nav-item.active .dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); }

  /* Stage */
  .stage {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(59,130,246,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, rgba(6,182,212,0.06), transparent 60%),
      var(--bg);
    position: relative;
  }
  .stage-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,26,0.7);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 12px;
    font-size: 12px;
    color: var(--text-2);
  }
  .crumb { color: var(--text-3); }
  .crumb b { color: var(--text); font-weight: 600; }
  .viewport-toggle {
    margin-left: auto;
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px;
    border-radius: 8px;
  }
  .viewport-toggle button {
    background: transparent;
    border: 0;
    color: var(--text-2);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 500;
  }
  .viewport-toggle button.active {
    background: var(--surface-3);
    color: var(--text);
  }

  /* Scrollbars */
  .navigator::-webkit-scrollbar, .stage::-webkit-scrollbar { width: 10px; height: 10px; }
  .navigator::-webkit-scrollbar-thumb, .stage::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 6px;
  }
  .navigator::-webkit-scrollbar-thumb:hover, .stage::-webkit-scrollbar-thumb:hover {
    background: var(--border-2);
  }

  /* ==== Shared design primitives ==== */
  .page { min-height: calc(100vh - 41px); }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .container-wide { max-width: 1440px; margin: 0 auto; padding: 0 40px; }

  h1, h2, h3, h4, h5 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--text); }
  h1 { font-size: 64px; line-height: 1.04; font-weight: 800; letter-spacing: -0.035em; }
  h2 { font-size: 44px; line-height: 1.08; font-weight: 800; letter-spacing: -0.03em; }
  h3 { font-size: 24px; line-height: 1.2; }
  p { line-height: 1.6; color: var(--text-2); margin: 0; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--blue-2);
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.22);
  }
  .eyebrow .ev-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 8px var(--blue); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--blue);
    color: white;
    box-shadow: 0 0 0 1px rgba(59,130,246,0.5), 0 8px 24px -8px rgba(59,130,246,0.6);
  }
  .btn-primary:hover { background: #2f6fd6; transform: translateY(-1px); }
  .btn-emerald {
    background: var(--emerald);
    color: #052E21;
    box-shadow: 0 0 0 1px rgba(16,185,129,0.5), 0 8px 24px -8px rgba(16,185,129,0.6);
  }
  .btn-emerald:hover { background: #0DA876; }
  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-2);
  }
  .btn-ghost:hover { background: var(--surface); border-color: #4a5680; }
  .btn-soft {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-soft:hover { background: var(--surface-3); }

  .card {
    background: linear-gradient(180deg, rgba(28,35,51,0.6), rgba(20,25,37,0.6));
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .card-hover { transition: all .2s; }
  .card-hover:hover {
    border-color: rgba(59,130,246,0.4);
    box-shadow: 0 20px 40px -20px rgba(59,130,246,0.3);
    transform: translateY(-2px);
  }

  /* grid backdrop */
  .grid-bg {
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .dot-bg {
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* gradient text */
  .grad-text {
    background: linear-gradient(135deg, #F1F5F9 0%, #94A3B8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .grad-blue {
    background: linear-gradient(135deg, #60A5FA 0%, #06B6D4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Generic placeholder */
  .placeholder {
    background:
      repeating-linear-gradient(45deg, rgba(148,163,184,0.05) 0 8px, transparent 8px 16px),
      var(--surface);
    border: 1px dashed var(--border-2);
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    padding: 16px;
  }

  /* Pill tag */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    font-family: var(--font-mono);
  }
  .tag-blue { background: rgba(59,130,246,0.1); color: var(--blue-2); border-color: rgba(59,130,246,0.3); }
  .tag-emerald { background: rgba(16,185,129,0.1); color: var(--emerald-2); border-color: rgba(16,185,129,0.3); }
  .tag-cyan { background: rgba(6,182,212,0.1); color: #67E8F9; border-color: rgba(6,182,212,0.3); }
  .tag-purple { background: rgba(168,85,247,0.1); color: #C084FC; border-color: rgba(168,85,247,0.3); }
  .tag-amber { background: rgba(245,158,11,0.1); color: #FCD34D; border-color: rgba(245,158,11,0.3); }

  /* Glow */
  .glow-blue { box-shadow: 0 0 60px -20px rgba(59,130,246,0.5); }

  /* Section spacing */
  .section { padding: 96px 0; position: relative; }
  .section-sm { padding: 64px 0; }

  /* Animated gradient mesh */
  .mesh-bg {
    position: absolute; inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .mesh-bg::before, .mesh-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
  }
  .mesh-bg::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #3B82F6, transparent 70%);
    top: -200px; right: -100px;
  }
  .mesh-bg::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #06B6D4, transparent 70%);
    bottom: -150px; left: -100px;
  }

  /* utility */
  .flex { display: flex; }
  .grid { display: grid; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; } .gap-8 { gap: 32px; } .gap-12 { gap: 48px; }
  .mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-8{margin-top:32px}.mt-12{margin-top:48px}.mt-16{margin-top:64px}.mt-20{margin-top:80px}
  .text-sm { font-size: 13px; } .text-xs { font-size: 12px; }
  .text-2 { color: var(--text-2); } .text-3 { color: var(--text-3); }
  .mono { font-family: var(--font-mono); }
  .stretch { width: 100%; }

  /* mobile frame */
  .device {
    width: 390px;
    height: 844px;
    background: #06090F;
    border-radius: 44px;
    border: 9px solid #1a2030;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.7), 0 0 0 2px #0a0e1a;
    flex-shrink: 0;
  }
  .device::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #06090F;
    border-radius: 20px;
    z-index: 100;
  }
  .device-screen {
    width: 100%; height: 100%;
    overflow-y: auto;
    background: var(--bg);
    color: var(--text);
    position: relative;
  }
  .device-screen::-webkit-scrollbar { width: 0; }

  /* Anim */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes metric-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(16,185,129,0); }
  }
  .blink { animation: blink 1s steps(2) infinite; }

  /* Marquee logo strip */
  .marquee-track {
    display: flex;
    width: max-content;
    animation: marquee 32s linear infinite;
    gap: 20px;
  }
  .marquee-track:hover { animation-play-state: paused; }

  .logo-chip {
    padding: 14px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-width: 180px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.02em;
    color: var(--text-2);
    filter: grayscale(100%);
    opacity: 0.55;
    transition: filter .3s, opacity .3s, border-color .3s, color .3s, transform .3s;
    cursor: pointer;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .logo-chip:hover {
    filter: grayscale(0%);
    opacity: 1;
    color: var(--text);
    border-color: rgba(59,130,246,0.35);
    transform: translateY(-1px);
  }
  .logo-chip .logo-mark {
    width: 26px; height: 26px;
    border-radius: 7px;
    display: grid; place-items: center;
    color: white;
    font-weight: 800; font-size: 12px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
