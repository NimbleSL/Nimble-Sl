<header class="header" [class.header--scrolled]="isScrolled()">
  <div class="header__container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" (click)="closeMobileMenu()">
      <img src="assets/images/logo/logo.png" alt="Nimble Software Lab" class="header__logo-img" />
    </a>

    <!-- Desktop Navigation -->
    <nav class="header__nav">
      @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="header__nav-link--active" class="header__nav-link">
        {{ link.label }}
      </a>
      }
    </nav>

    <!-- Desktop CTA -->
    <a routerLink="/contact" class="header__cta">
      Contact Us
    </a>

    <!-- Mobile Menu Toggle -->
    <button class="header__hamburger" (click)="toggleMobileMenu()"
      [class.header__hamburger--active]="isMobileMenuOpen()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
  <div class="header__mobile-menu">
    <nav class="header__mobile-nav">
      @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="header__mobile-link--active" class="header__mobile-link"
        (click)="closeMobileMenu()">
        {{ link.label }}
      </a>
      }
      <a routerLink="/contact" class="header__mobile-cta" (click)="closeMobileMenu()">
        Contact Us
      </a>
    </nav>
  </div>
  }
</header>
